name: PR checks

# Per-PR sanity check: runs the same slim build that Cloudflare
# Pages uses in production, plus the bibtex/venue lint. No LFS, no
# Sharp/PDF compile, no R2 credentials — finishes in ~1 min.
#
# Required-status-check on main: "build-and-lint" (the job below).
# Configured in repo Settings → Branches → main rule.

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no LFS)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Same command Cloudflare Pages uses for its production build.
      # Renders templates against the committed assets-manifest.json
      # and assembles a slim out/ bundle. No binary assets needed.
      - name: Build (slim CF path)
        run: npm run build:cf

      # Catches the failure mode where papers.yaml's `journal:` field
      # is updated to a new venue but the MD bibtex still says
      # "arXiv preprint". See build/lint_bibtex.js.
      - name: Lint bibtex / papers.yaml alignment
        run: npm run lint:bibtex

      # Verifies every cdn.agenticlearning.ai URL baked into the
      # rendered HTML actually resolves. Catches sync:r2 skipping a
      # file, or stale/typo'd manifest entries that would 404 in prod.
      - name: Check manifest consistency
        run: node build/check_manifest_consistency.js

      # Every PNG/JPG under a path where the site wraps images in
      # <picture> must have a .webp sibling in the manifest, so the
      # rendered <source type="image/webp"> is populated. Same check
      # runs as scripts/checks/02_webp_companions.js at pre-commit.
      - name: Check WebP companions
        run: node build/check_webp_companions.js

      # Audits paper-content.json across every paper for the
      # bibliography regressions we hit during the inject_bbl /
      # normalize_bib_tags rollout: empty <ul class="ltx_biblist">
      # on enable_full_paper papers, long author lists in tags,
      # and leftover ltx_missing_citation spans. See
      # build/check_bibliography.js.
      - name: Check bibliography integrity
        run: node build/check_bibliography.js
