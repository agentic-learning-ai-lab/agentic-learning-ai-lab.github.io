name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache LaTeX
        id: cache-texlive
        uses: actions/cache@v4
        with:
          path: |
            /usr/share/texlive
            /usr/share/texmf
            /var/lib/texmf
          key: texlive-${{ runner.os }}-v1

      - name: Install LaTeX and Ghostscript
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-bibtex-extra \
            biber \
            ghostscript

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Prepare output
        run: |
          set -e
          mkdir -p out
          cp index.html index.js search.js person.js paper-view.js out/
          cp site.webmanifest favicon.ico out/
          cp research.js out/
          cp -R people out/
          cp -R research out/
          cp -R contact out/
          cp -R assets out/
          cp -R css out/
          cp -R areas out/
          cp -R includes out/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
