name: Deploy to GitHub Pages

# Production deploy on push to main. Kept active until DNS for
# agenticlearning.ai is cut over to Cloudflare Pages; then this
# whole workflow file can be deleted.
#
# Post-LFS-migration this is a SLIM build: it runs `npm run build:cf`
# (templates + HTML + CSS only, no Sharp / PDF compile / LFS pull).
# Browser refs in the rendered HTML resolve through cdn.agenticlearning.ai
# via the committed assets-manifest.json. Same bundle CF Pages produces.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no LFS)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (slim — same path Cloudflare Pages uses)
        run: npm run build:cf

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
